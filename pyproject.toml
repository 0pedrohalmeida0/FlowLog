# ============================================================
# FlowLog — pyproject.toml
# ============================================================
# Configuração central de ferramentas (pytest, ruff, black, mypy).
# A config de pacote instalável (v1.5) virá aqui também.
# ============================================================

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
]
filterwarnings = [
    "error",
    # mysql-connector levanta alguns DeprecationWarning; ignora
    "ignore::DeprecationWarning:mysql.*",
    "ignore::DeprecationWarning:bcrypt.*",
]

[tool.coverage.run]
source = ["src"]
omit = [
    "src/teste_insercao.py",
    # Módulos que dependem de MySQL ativo — testados manualmente ou em
    # suite de integração (v1.3+). Em CI, ficaria sem cobertura real
    # e quebraria o fail-under sem motivo.
    "src/database.py",
    "src/login.py",
    "src/main.py",
    "src/cadastrar_usuario.py",
    "src/cadastro_interativo.py",
    "src/listar_produtos.py",
    "src/entrada.py",
    "src/saida_estoque.py",
    "src/ver_historico.py",
    "src/gerenciar_fornecedor.py",
    "src/editar_fornecedor.py",
    "src/excluir_fornecedor.py",
    "src/configurar_alerta.py",
    "src/relatorio_curva.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
show_missing = true
precision = 1
fail_under = 80

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["src/teste_insercao.py"]

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: isort, B: bugbear, UP: pyupgrade
select = ["E", "W", "F", "I", "B", "UP"]
ignore = [
    "E501",   # line-too-long (black já cuida)
    "B008",   # function call in default argument (comum em Pydantic/Django)
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true   # mysql-connector e bcrypt não têm stubs
disallow_untyped_defs = false   # strict fica pra v1.4
no_implicit_optional = true
