# docker-compose.cloud.yml — FlowLog Cloud v2.1 stack local
#
# Como usar:
#   docker compose -f docker-compose.cloud.yml up --build
#
# Stack:
#   - postgres: PostgreSQL 15
#   - mailpit: SMTP capture (1025) + web UI (8025) — vê e-mails em dev
#   - api: backend FastAPI em :8000
#
# Em dev, vê e-mails enviados em http://localhost:8025

services:
  postgres:
    image: postgres:15-alpine
    container_name: flowlog-postgres
    environment:
      POSTGRES_USER: flowlog
      POSTGRES_PASSWORD: flowlog
      POSTGRES_DB: flowlog
    ports:
      - "5432:5432"
    volumes:
      - flowlog_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowlog -d flowlog"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: flowlog-mailpit
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  api:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    container_name: flowlog-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: flowlog
      DB_PASSWORD: flowlog
      DB_NAME: flowlog
      JWT_SECRET: "trocar-em-prod-com-secrets.token_urlsafe(32)"
      AMBIENTE: dev
      CORS_ORIGINS: '["http://localhost:5173", "http://localhost:8025"]'
      # Email via Mailpit (v2.1: grátis self-hosted)
      EMAIL_PROVIDER: smtp
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      EMAIL_FROM: "FlowLog <noreply@flowlog.local>"
      # Seed super admin
      SUPER_ADMIN_EMAIL: admin@flowlog.local
      SUPER_ADMIN_SENHA: trocarnoprod
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    command: >
      uvicorn cloud.main:app
        --host 0.0.0.0
        --port 8000
        --reload

volumes:
  flowlog_pgdata:
    name: flowlog_cloud_pgdata
