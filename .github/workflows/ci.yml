name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e '.[dev]'
      - run: ruff check src/ tests/ cloud/
      - run: black --check src/ tests/ cloud/

  test:
    name: Test + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e '.[dev]'
      - name: Run tests
        env:
          JWT_SECRET: ci-test-secret
          DB_HOST: localhost
        run: |
          pytest --cov=src --cov=cloud --cov-report=xml --cov-report=term
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/cloud/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/cloud/frontend/package-lock.json
      - run: npm ci || npm install
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/cloud/frontend/dist

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f Dockerfile.cloud -t flowlog/cloud:ci-${{ github.sha }} .
      - name: Smoke test
        run: |
          docker run -d --name flowlog-test -p 8000:8000 \
            -e JWT_SECRET=ci -e DB_HOST=localhost flowlog/cloud:ci-${{ github.sha }}
          sleep 5
          curl -sf http://localhost:8000/v1/health || (docker logs flowlog-test && exit 1)
          docker stop flowlog-test
